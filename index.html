<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermark Your Image</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Watermark Your Image</h1>

    <div class="container"> 
        <div class="controls">
            <label for="placement">Placement:</label>
            <select id="placement">
                <option value="top-left">Top Left</option>
                <option value="top-right">Top Right</option>
                <option value="bottom-left">Bottom Left</option>
                <option value="bottom-right">Bottom Right</option>
                <option value="center">Center</option>
            </select>

            <label for="sizeSlider">Size:</label>
            <input type="range" id="sizeSlider" min="10" max="100" value="50">

            <label for="prominenceSlider">Prominence:</label>
            <input type="range" id="prominenceSlider" min="1" max="10" value="5">

            <label for="artistName">Artist Name:</label>
            <input type="text" id="artistName" placeholder="Your Artist Name">

            <label for="website">Website (optional):</label>
            <input type="text" id="website" placeholder="https://yourwebsite.com">

            <label for="year">Copyright Year:</label>
            <input type="number" id="year" min="1900" value="2023"> 
        </div>
        <!-- ... existing code ... -->

<div id="preview"> </div> 
<button id="downloadBtn">Download Watermarked Image</button>


<!-- ... rest of the HTML ... -->





        <input type="file" id="imageInput" accept="image/*"> </div> 


    <script src="script.js"></script>
</body>
</html>
