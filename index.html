<!DOCTYPE html>
<html>
<head>
<title>Watermark Tool</title>
<link rel="stylesheet" href="style.css"> </head>
<body>

  <h1>Watermark Your Image</h1>
  <div id="controls">
    <label for="placement">Placement:</label>
    <select id="placement">
      <option value="top-left">Top Left</option>
      <option value="top-right">Top Right</option>
      <option value="bottom-left">Bottom Left</option>
      <option value="bottom-right">Bottom Right</option>
      <option value="center">Center</option>
    </select>

    <label for="sizeSlider">Size:</label>
    <input type="range" id="sizeSlider" min="10" max="100" value="50">

    <label for="prominenceSlider">Prominence:</label>
    <input type="range" id="prominenceSlider" min="1" max="10" value="5">

  </div> 

  <input type="file" id="imageInput"> </body>
</html>
